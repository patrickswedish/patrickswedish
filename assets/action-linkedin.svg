<svg xmlns="http://www.w3.org/2000/svg" width="188" height="40" viewBox="0 0 188 40" role="img" aria-labelledby="title desc">
  <title id="title">Connect with Patrick Ribbsaeter on LinkedIn</title>
  <desc id="desc">A dark navy LinkedIn button with a blue accent and external-link indicator.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102846"/>
      <stop offset="1" stop-color="#0b1b31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b7cfa"/>
      <stop offset="1" stop-color="#35d4ff"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="187" height="39" rx="10" fill="url(#bg)" stroke="#35d4ff" stroke-opacity="0.34"/>
  <rect x="0" y="0" width="4" height="40" rx="2" fill="url(#accent)"/>
  <rect x="15" y="10" width="20" height="20" rx="4" fill="#0a66c2"/>
  <text x="25" y="25.5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">in</text>
  <text x="46" y="17" fill="#93a8c5" font-family="Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1.2">LINKEDIN</text>
  <text x="46" y="29" fill="#f6f9ff" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.7">CONNECT</text>
  <text x="169" y="25" text-anchor="middle" fill="#35d4ff" font-family="Arial, sans-serif" font-size="16" font-weight="700">↗</text>
</svg>
