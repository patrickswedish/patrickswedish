<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Patrick — AI Systems Architect, Founding Engineer, AI Infrastructure and Autonomous Systems</title>
  <desc id="desc">Dark navy professional banner presenting Patrick as an AI systems architect and founding engineer focused on AI infrastructure and autonomous systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1b31"/>
      <stop offset="1" stop-color="#102846"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b7cfa"/>
      <stop offset="1" stop-color="#35d4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="70%">
      <stop offset="0" stop-color="#35d4ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#35d4ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8ba4c7" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="330" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="330" rx="24" fill="url(#glow)"/>
  <rect width="1200" height="330" rx="24" fill="url(#grid)"/>
  <path d="M0 4Q0 0 4 0H1196Q1200 0 1200 4" fill="none" stroke="url(#accent)" stroke-width="3"/>

  <g opacity="0.75" fill="none" stroke="url(#accent)" stroke-width="2">
    <path d="M835 79h96l31 31h90"/>
    <path d="M893 142h85l32 32h128"/>
    <path d="M824 222h92l32-32h88"/>
    <circle cx="835" cy="79" r="5" fill="#5b7cfa" stroke="none"/>
    <circle cx="1052" cy="110" r="5" fill="#35d4ff" stroke="none"/>
    <circle cx="893" cy="142" r="5" fill="#5b7cfa" stroke="none"/>
    <circle cx="1138" cy="174" r="5" fill="#35d4ff" stroke="none"/>
    <circle cx="824" cy="222" r="5" fill="#5b7cfa" stroke="none"/>
    <circle cx="1036" cy="190" r="5" fill="#35d4ff" stroke="none"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="78" y="91" fill="#93a8c5" font-size="16" font-weight="700" letter-spacing="3.2">AI SYSTEMS ARCHITECT · FOUNDING ENGINEER</text>
    <text x="74" y="171" fill="#f6f9ff" font-size="68" font-weight="800" letter-spacing="-2">PATRICK</text>
    <rect x="78" y="194" width="430" height="4" rx="2" fill="url(#accent)" filter="url(#softGlow)"/>
    <text x="78" y="242" fill="#d8e3f2" font-size="25" font-weight="600">Building systems that do the work.</text>
    <text x="78" y="280" fill="#8fa7c5" font-size="17" font-weight="500">AI INFRASTRUCTURE  /  AUTONOMOUS SYSTEMS  /  PRODUCTION SOFTWARE</text>
  </g>
</svg>
