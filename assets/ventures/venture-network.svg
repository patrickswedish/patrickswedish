<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="190" viewBox="0 0 1200 190" role="img" aria-labelledby="title desc">
  <title id="title">Ribbsaeter Venture Network</title>
  <desc id="desc">A connected portfolio spanning artificial intelligence, growth, luxury, property, mobility, sport, and synthetic media.</desc>
  <defs>
    <style>
      .flow{stroke-dasharray:7 14;animation:flow 8s linear infinite}
      .pulse{animation:pulse 3s ease-in-out infinite}
      .pulse2{animation:pulse 3s ease-in-out 1.5s infinite}
      @keyframes flow{to{stroke-dashoffset:-84}}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
      @media(prefers-reduced-motion:reduce){.flow,.pulse,.pulse2{animation:none}}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#060B13"/><stop offset="1" stop-color="#101F31"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BE8CFF"/><stop offset=".5" stop-color="#5FE7FF"/><stop offset="1" stop-color="#F2C66D"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#5FE7FF" stop-opacity=".14"/><stop offset="1" stop-color="#5FE7FF" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#CFEAFF" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1200" height="190" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="190" rx="22" fill="url(#grid)"/>
  <circle cx="600" cy="95" r="150" fill="url(#halo)"/>
  <g class="flow" fill="none" stroke="url(#line)" stroke-width="1.5" opacity=".6">
    <path d="M115 55h190l65 40h135M115 135h190l65-40h135M695 95h135l65-40h190M695 95h135l65 40h190"/>
  </g>
  <g fill="#5FE7FF">
    <circle class="pulse" cx="115" cy="55" r="4"/><circle class="pulse2" cx="115" cy="135" r="4"/>
    <circle class="pulse2" cx="1085" cy="55" r="4"/><circle class="pulse" cx="1085" cy="135" r="4"/>
  </g>
  <rect x="505" y="39" width="190" height="112" rx="18" fill="#09131F" stroke="url(#line)" stroke-width="1.5"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <text x="600" y="104" fill="#F4F9FF" font-size="25" font-weight="800" letter-spacing=".8">VENTURE NETWORK</text>
  </g>
</svg>
